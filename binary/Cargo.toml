[package]
name = "acir2llzk"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "acir2llzk"
path = "src/main.rs"

[dependencies]
acir = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19", features = ["bn254"] }
llzk = { git = "https://github.com/Veridise/llzk-rs", features = ["bigint"] }
llzk-sys = { git = "https://github.com/Veridise/llzk-rs" }
acir_llzk = { path = "../library" }
base64 = "0.22"
serde_json = "1"
