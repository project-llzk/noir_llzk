[package]
name = "acir_llzk"
version = "0.1.0"
edition = "2024"

[dependencies]
acir = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19", features = ["bn254"] }
num-bigint = "0.4"

# LLZK Rust bindings and C API sys crate, with bigint support for felt.const from field elements
llzk = { git = "https://github.com/Veridise/llzk-rs", features = ["bigint"], rev = "cb836a8"}
llzk-sys = { git = "https://github.com/Veridise/llzk-rs", rev = "cb836a8"}
base64 = "0.22"
serde_json = "1"
llzk_interpreter = { git = "ssh://git@github.com/reilabs/llzk-interpreter.git", rev = "29cb56a52e38a012098757ecff407b29ad8bb0ee", optional = true }

[features]
default = []
e2e = ["dep:llzk_interpreter"]

[dev-dependencies]
toml = "0.8"

[lints.rust]
missing_docs = "warn"
