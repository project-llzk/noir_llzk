[package]
name = "acir_llzk"
version = "0.1.0"
edition = "2024"

[dependencies]
acir = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19", features = ["bn254"] }
num-bigint = "0.4"

# LLZK Rust bindings and C API sys crate, with bigint support for felt.const from field elements
llzk = { git = "ssh://git@github.com/reilabs/llzk-rs-private.git", features = ["bigint"], branch="add-ram"}
llzk-sys = { git = "ssh://git@github.com/reilabs/llzk-rs-private.git", branch="add-ram" }
base64 = "0.22"
serde_json = "1"

[dev-dependencies]
toml = "0.8"

[lints.rust]
missing_docs = "warn"
