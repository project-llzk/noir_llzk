[package]
name = "acir_llzk"
version = "0.1.0"
edition = "2024"

[dependencies]
acir = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19", features = ["bn254"] }
brillig_vm = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19" }
acvm = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19", features = ["bn254"]}
bn254_blackbox_solver = { git = "https://github.com/noir-lang/noir", tag = "v1.0.0-beta.19" }
num-bigint = "0.4"
keccak = "=0.2.0-rc.1"

# LLZK Rust bindings and C API sys crate, with bigint support for felt.const from field elements
llzk = { git = "https://github.com/Veridise/llzk-rs", features = ["bigint", "pcl-backend"], rev = "d354ea8"}
llzk-sys = { git = "https://github.com/Veridise/llzk-rs", features = ["pcl-backend"], rev = "d354ea8"}
base64 = "0.22"
serde_json = "1"
llzk_interpreter = { git = "https://github.com/project-llzk/llzk-interpreter.git", rev = "054dd86076d043fecb7de91a9b38eb53de79956b", optional = true }

[features]
default = []
e2e = ["dep:llzk_interpreter"]

[dev-dependencies]
toml = "0.8"

[lints.rust]
missing_docs = "warn"
