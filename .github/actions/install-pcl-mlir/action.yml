name: "Install PCL MLIR"
description: "Downloads and installs the PCL MLIR dialect"
inputs:
  ref:
    description: "Commit used for building"
    required: true
  root:
    description: "Where is the library going to be downloaded"
    default: "./pcl-mlir"
  type:
    description: "Build type"
    default: "Debug"
  mlir-dir:
    description: "Directory where MLIR is installed"
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        repository: Veridise/pcl-mlir
        ref: ${{ inputs.ref }}
        path: ${{ inputs.root }}
        fetch-depth: 1
    - name: "Cache PCL MLIR build"
      id: cache-pcl-mlir
      uses: actions/cache@v4
      with:
        path: ${{ inputs.root }}/build
        key: ${{ runner.os }}-pcl-mlir-${{ inputs.ref }}-${{ inputs.type }}-${{ inputs.mlir-dir }}
    - name: "Set environment variables"
      shell: bash
      run: |
        echo LLZK_PCL_ROOT=$(realpath $_ROOT) >> $GITHUB_ENV
        echo LLZK_PCL_PREFIX=$(realpath $_BUILD) >> $GITHUB_ENV
      env:
        _ROOT: ${{ inputs.root }}
        _BUILD: ${{ inputs.root }}/build
    - name: "Configure CMake"
      if: steps.cache-pcl-mlir.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p $LLZK_PCL_PREFIX

        cmake \
          -S $LLZK_PCL_ROOT \
          -B $LLZK_PCL_PREFIX \
          -DCMAKE_BUILD_TYPE=$_BUILD_TYPE \
          -DBUILD_TESTING=OFF \
          -DCMAKE_PREFIX_PATH=$_MLIR_DIR
      env:
        _MLIR_DIR: ${{ inputs.mlir-dir }}
        _BUILD_TYPE: ${{ inputs.type }}
    - name: "Build project"
      if: steps.cache-pcl-mlir.outputs.cache-hit != 'true'
      shell: bash
      run: cmake --build $LLZK_PCL_PREFIX --parallel
