name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NOIR_TOOLCHAIN: v1.0.0-beta.19

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH for private deps
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LLZK_INTERPRETER_DEPLOY_KEY }}
      - name: Load shared env
        run: cat .github/workflows/llzk.env >> "$GITHUB_ENV"
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Cache homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/Homebrew/
          key: ${{ runner.os }}-homebrew-llvm20
      - name: Install LLVM & MLIR
        run: brew install llvm@20
      - name: Install LLZK
        uses: ./.github/actions/install-llzk
        with:
          ref: d965a33d29b77efd53d312dc341e32997698dadd
          type: Debug
          mlir-dir: ${{ env.MLIR_SYS_200_PREFIX }}
      - name: Install PCL MLIR
        uses: ./.github/actions/install-pcl-mlir
        with:
          ref: 55cf619b032314198aacafc305871fb66b12b70e
          type: Debug
          mlir-dir: ${{ env.MLIR_SYS_200_PREFIX }}
      - name: Cache Noir toolchain
        id: cache-noir
        uses: actions/cache@v4
        with:
          path: ~/.nargo
          key: ${{ runner.os }}-noir-${{ env.NOIR_TOOLCHAIN }}
      - name: Add Noir to PATH
        run: echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - name: Install Noir toolchain
        if: steps.cache-noir.outputs.cache-hit != 'true'
        uses: noir-lang/noirup@v0.1.2
        with:
          toolchain: ${{ env.NOIR_TOOLCHAIN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: |
          cargo clippy -p acir_llzk --all-targets --features e2e -- -D warnings
          cargo clippy -p acir2llzk --all-targets -- -D warnings
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: E2E tests
        run: cargo test -p acir_llzk --features e2e -- tests::e2e
