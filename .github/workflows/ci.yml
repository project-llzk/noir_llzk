name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NOIR_TOOLCHAIN: v1.0.0-beta.19

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Load shared env
        run: cat .github/workflows/llzk.env >> "$GITHUB_ENV"
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false
      - name: Install LLVM 20 + MLIR (apt)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-20-dev libmlir-20-dev mlir-20-tools \
            clang-20 libclang-20-dev libclang-rt-20-dev \
            libpolly-20-dev \
            cmake ninja-build
      - name: Install PCL MLIR
        uses: ./.github/actions/install-pcl-mlir
        with:
          ref: 55cf619b032314198aacafc305871fb66b12b70e
          type: Debug
          mlir-dir: ${{ env.MLIR_SYS_200_PREFIX }}
      - name: Install LLZK
        uses: ./.github/actions/install-llzk
        with:
          ref: 8d5fc3141d268475673bb1db69701c3d12c13435
          type: Debug
          mlir-dir: ${{ env.MLIR_SYS_200_PREFIX }}
      - name: Cache Noir toolchain
        id: cache-noir
        uses: actions/cache@v4
        with:
          path: ~/.nargo
          key: ${{ runner.os }}-noir-${{ env.NOIR_TOOLCHAIN }}
      - name: Add Noir to PATH
        run: echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - name: Install Noir toolchain
        if: steps.cache-noir.outputs.cache-hit != 'true'
        uses: noir-lang/noirup@v0.1.2
        with:
          toolchain: ${{ env.NOIR_TOOLCHAIN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: |
          cargo clippy -p acir_llzk --all-targets --features e2e -- -D warnings
          cargo clippy -p acir2llzk --all-targets -- -D warnings
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: E2E tests
        run: cargo test --release -p acir_llzk --features e2e -- tests::e2e

  nix-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@9280e7aca88deada44c930f1e2c78e21c3ae3edd # v31.7.0
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Build and test
        run: nix --print-build-logs build
